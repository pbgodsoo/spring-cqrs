server:
  port: 8082

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10     # 주소를 갱신하는 시간
    lease-expiration-duration-in-seconds: 30  # 가져온 주소의 만료 시간
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:9090/eureka
    register-with-eureka: true  # 현재 자신의 IP주소를 유레카에 등록
    fetch-registry: true        # 유레카에 등록된 주소들을 받아오는 것

spring:
  application:
    name: board-query
  kafka:
    bootstrap-servers: 3.39.191.209:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: board-group-1
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

    jpa:
      database-platform: org.hibernate.dialect.MariaDBDialect
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          format_sql: true

logging:
  level:
    com.example.board_query: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

